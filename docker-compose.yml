version: '3.8'

services:
  # Banco de dados MySQL
  mysql:
    image: mysql:8.0
    container_name: bancada_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: flask_crud
      MYSQL_USER: bancada_user
      MYSQL_PASSWORD: bancada123
    ports:
      - "3307:3306"  # Mapeia porta 3307 do host para 3306 do container
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bancada_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # Aplicação Flask
  web:
    build: .
    container_name: bancada_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=mysql
      - DB_USER=bancada_user
      - DB_PASSWORD=bancada123
      - DB_NAME=flask_crud
      - DB_PORT=3306
      - SECRET_KEY=sua-chave-secreta-aqui-mude-em-producao
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bancada_network
    volumes:
      - ./templates:/app/templates
      - ./scripts:/app/scripts

volumes:
  mysql_data:

networks:
  bancada_network:
    driver: bridge