<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário - Bancada TI</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46a0 100%) !important;
            padding: 12px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .navbar-brand {
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: white !important;
            font-weight: 700;
        }

        .nav-link {
            font-size: 0.95rem;
            padding: 8px 15px !important;
            border-radius: 8px;
            transition: all 0.3s;
            margin: 0 3px;
            color: rgba(255,255,255,0.9) !important;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.2);
            color: white !important;
        }

        .nav-link.active {
            background: rgba(255,255,255,0.25);
            color: white !important;
            font-weight: 600;
        }

        /* Container */
        .form-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Card do formulário */
        .form-card {
            background: white !important;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            border: none;
        }

        .card-title {
            color: #4a5568;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s;
            background: white;
            color: #1a202c;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .form-control:disabled {
            background: #f7fafc;
            color: #718096;
        }

        .form-control::placeholder {
            color: #a0aec0;
        }

        .text-muted {
            color: #718096 !important;
        }

        /* Regras de senha */
        .senha-regras {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            margin-top: 10px;
        }

        .senha-regras ul {
            list-style: none;
            padding-left: 0;
            margin-bottom: 0;
        }

        .senha-regras li {
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #718096;
        }

        .senha-regras li.valid {
            color: #48bb78;
        }

        .mensagem-senha {
            font-size: 0.9rem;
            padding: 8px;
            border-radius: 8px;
        }

        .text-success {
            color: #48bb78 !important;
        }

        .text-danger {
            color: #f56565 !important;
        }

        /* Botões */
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #718096;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            color: white;
        }

        .btn-secondary:hover {
            background: #4a5568;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.visible {
            display: block;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 9999;
            animation: slideIn 0.3s;
            border-left: 4px solid;
        }

        .toast-notification.success {
            border-left-color: #48bb78;
        }

        .toast-notification.error {
            border-left-color: #f56565;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="toast" class="toast-notification"></div>

    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="/dashboard">
                <i class="fas fa-tools me-2"></i>🔧 Bancada TI
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuSistema">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuSistema">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/equipamento/cadastro">
                            <i class="fas fa-desktop me-1"></i>Cadastrar Equipamento
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/usuario/cadastro">
                            <i class="fas fa-user-plus me-1"></i>Cadastrar Usuário
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/quadro-chamados">
                            <i class="fas fa-clipboard-list me-1"></i>Lista
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/relatorios">
                            <i class="fas fa-chart-bar me-1"></i>Relatórios
                        </a>
                    </li>
                     <li class="nav-item">
                        <a class="nav-link" href="/logs">
                            <i class="fas fa-chart-bar me-1"></i>Logs
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <span class="text-light small">
                        <i class="fas fa-user-circle me-1"></i>
                        <span id="userNameDisplay">Carregando...</span>
                    </span>
                    <button onclick="logout()" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-sign-out-alt me-1"></i>Sair
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div style="margin-top: 80px;"></div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="form-container">
        <div class="form-card">
            <h3 class="card-title">
                <i class="fas fa-user-plus me-2"></i>
                Cadastro de Usuário
            </h3>

            <form id="formUsuario">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-user me-1"></i> Nome completo
                    </label>
                    <input type="text" class="form-control" id="nome" required 
                           placeholder="Digite o nome completo" autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-at me-1"></i> Usuário
                    </label>
                    <input type="text" class="form-control" id="usuario" disabled>
                    <small class="text-muted">
                        <i class="fas fa-info-circle me-1"></i>
                        Gerado automaticamente a partir do nome
                    </small>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-envelope me-1"></i> Email
                    </label>
                    <input type="email" class="form-control" id="email" required 
                           placeholder="email@exemplo.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-id-card me-1"></i> Número funcional
                    </label>
                    <input type="text" class="form-control" id="funcional" required 
                           placeholder="Digite o número funcional">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-lock me-1"></i> Senha
                    </label>
                    <input type="password" class="form-control" id="senha" required 
                           placeholder="Digite a senha">
                    <div class="senha-regras">
                        <small class="text-muted">
                            <i class="fas fa-shield-alt me-1"></i>
                            A senha deve conter:
                        </small>
                        <ul class="mt-2">
                            <li id="regra-tamanho">
                                <i class="fas fa-circle me-1" style="font-size: 8px;"></i>
                                Mínimo de 6 caracteres
                            </li>
                            <li id="regra-maiuscula">
                                <i class="fas fa-circle me-1" style="font-size: 8px;"></i>
                                1 letra maiúscula
                            </li>
                            <li id="regra-minuscula">
                                <i class="fas fa-circle me-1" style="font-size: 8px;"></i>
                                1 letra minúscula
                            </li>
                            <li id="regra-numero">
                                <i class="fas fa-circle me-1" style="font-size: 8px;"></i>
                                1 número
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-check-circle me-1"></i> Confirmar senha
                    </label>
                    <input type="password" class="form-control" id="confirmarSenha" required 
                           placeholder="Confirme a senha">
                    <div id="mensagemSenha" class="mensagem-senha mt-1"></div>
                </div>

                <div class="loading" id="loading"></div>

                <div class="d-flex gap-2 mt-4">
                    <a href="/dashboard" class="btn btn-secondary flex-grow-1">
                        <i class="fas fa-arrow-left me-1"></i>
                        Voltar
                    </a>
                    <button type="submit" class="btn btn-primary flex-grow-1" id="btnSubmit">
                        <i class="fas fa-save me-1"></i>
                        Cadastrar usuário
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const API_URL = 'http://localhost:5000/api';

        document.addEventListener('DOMContentLoaded', function() {
            verificarAuth();
            carregarUsuario();
        });

        function verificarAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login';
            }
        }

        function carregarUsuario() {
            const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
            if (usuario.nome_completo) {
                document.getElementById('userNameDisplay').textContent = usuario.nome_completo;
            }
        }

        // Gerar usuário automaticamente
        document.getElementById('nome').addEventListener('input', function() {
            const nome = this.value.trim();
            
            if (nome) {
                const partes = nome.split(' ').filter(p => p.length > 0);
                
                if (partes.length >= 2) {
                    const primeirasLetras = partes.slice(0, -1).map(n => n.charAt(0).toLowerCase());
                    const ultimoSobrenome = partes[partes.length - 1].toLowerCase();
                    const usuario = primeirasLetras.join('') + ultimoSobrenome;
                    
                    const usuarioFinal = usuario.normalize('NFD')
                        .replace(/[\u0300-\u036f]/g, '')
                        .replace(/[^a-z]/g, '');
                    
                    document.getElementById('usuario').value = usuarioFinal;
                } else {
                    const usuario = partes[0].toLowerCase()
                        .normalize('NFD')
                        .replace(/[\u0300-\u036f]/g, '')
                        .replace(/[^a-z]/g, '');
                    document.getElementById('usuario').value = usuario;
                }
            } else {
                document.getElementById('usuario').value = '';
            }
        });

        // Validação de senha
        const senhaInput = document.getElementById('senha');
        const confirmarSenhaInput = document.getElementById('confirmarSenha');
        const mensagemSenha = document.getElementById('mensagemSenha');

        function validarSenha() {
            const senha = senhaInput.value;
            
            const regras = {
                tamanho: senha.length >= 6,
                maiuscula: /[A-Z]/.test(senha),
                minuscula: /[a-z]/.test(senha),
                numero: /[0-9]/.test(senha)
            };
            
            document.getElementById('regra-tamanho').style.color = regras.tamanho ? '#48bb78' : '#718096';
            document.getElementById('regra-maiuscula').style.color = regras.maiuscula ? '#48bb78' : '#718096';
            document.getElementById('regra-minuscula').style.color = regras.minuscula ? '#48bb78' : '#718096';
            document.getElementById('regra-numero').style.color = regras.numero ? '#48bb78' : '#718096';
            
            return regras.tamanho && regras.maiuscula && regras.minuscula && regras.numero;
        }

        senhaInput.addEventListener('input', validarSenha);

        function validarConfirmacao() {
            const senha = senhaInput.value;
            const confirmar = confirmarSenhaInput.value;
            
            if (confirmar) {
                if (senha === confirmar) {
                    mensagemSenha.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Senhas conferem</span>';
                    return true;
                } else {
                    mensagemSenha.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>Senhas não conferem</span>';
                    return false;
                }
            } else {
                mensagemSenha.innerHTML = '';
                return false;
            }
        }

        confirmarSenhaInput.addEventListener('input', validarConfirmacao);

        document.getElementById('formUsuario').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const token = localStorage.getItem('token');
            if (!token) return;
            
            const senhaValida = validarSenha();
            const senhasIguais = validarConfirmacao();
            
            if (!senhaValida) {
                alert('A senha não atende aos requisitos de segurança!');
                return;
            }
            
            if (!senhasIguais) {
                alert('As senhas não conferem!');
                return;
            }
            
            const formData = {
                nome_completo: document.getElementById('nome').value,
                usuario: document.getElementById('usuario').value,
                email: document.getElementById('email').value,
                numero_funcional: document.getElementById('funcional').value,
                senha: senhaInput.value
            };
            
            const loading = document.getElementById('loading');
            const btnSubmit = document.getElementById('btnSubmit');
            
            loading.classList.add('visible');
            btnSubmit.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/usuarios`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('usuario');
                    window.location.href = '/login';
                    return;
                }
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('✅ Usuário cadastrado com sucesso!');
                    window.location.href = '/dashboard';
                } else {
                    alert('❌ ' + (result.erro || 'Erro ao cadastrar'));
                }
            } catch (error) {
                alert('❌ Erro de conexão');
            } finally {
                loading.classList.remove('visible');
                btnSubmit.disabled = false;
            }
        });

        function logout() {
            if (confirm('Deseja realmente sair?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('usuario');
                window.location.href = '/login';
            }
        }
    </script>
    <!-- Socket.IO -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
    // Configuração do Socket.IO
    let socket;
    
    function initSocket() {
        socket = io('http://localhost:5000');
        
        socket.on('connect', function() {
            console.log('🟢 Conectado ao servidor');
            if (typeof mostrarToast === 'function') {
                mostrarToast('Conectado em tempo real', 'success');
            }
        });
        
        socket.on('atualizacao_sistema', function(data) {
            console.log('📢 Atualização:', data);
            
            let mensagem = '';
            if (data.acao === 'CREATE') mensagem = '🆕 Novo chamado criado!';
            else if (data.acao === 'UPDATE') mensagem = '✏️ Chamado atualizado!';
            else if (data.acao === 'MOVE') mensagem = '📦 Chamado movido!';
            else if (data.acao === 'DELETE') mensagem = '🗑️ Chamado deletado!';
            
            if (mensagem && typeof mostrarToast === 'function') {
                mostrarToast(mensagem, 'info');
            }
            
            // Recarregar dados baseado na página
            if (window.location.pathname === '/dashboard' && typeof carregarChamados === 'function') {
                carregarChamados();
            } else if (window.location.pathname === '/quadro-chamados' && typeof carregarChamadosLista === 'function') {
                carregarChamadosLista();
            }
        });
    }
    
    // Iniciar após login
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('token')) {
            initSocket();
        }
    });
</script>
</body>
</html>
