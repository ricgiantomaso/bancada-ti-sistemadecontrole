<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs do Sistema - Bancada TI</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <!-- Date Range Picker -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46a0 100%) !important;
            padding: 12px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .navbar-brand {
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: white !important;
            font-weight: 700;
        }

        .nav-link {
            font-size: 0.95rem;
            padding: 8px 15px !important;
            border-radius: 8px;
            transition: all 0.3s;
            margin: 0 3px;
            color: rgba(255,255,255,0.9) !important;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.2);
            color: white !important;
        }

        .nav-link.active {
            background: rgba(255,255,255,0.25);
            color: white !important;
            font-weight: 600;
        }

        .logs-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .logs-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            border: none;
        }

        .page-title {
            color: #4a5568;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        /* Filtros */
        .filters-section {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }

        .filter-title {
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-control, .form-select {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px 12px;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #718096;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            color: white;
        }

        .btn-secondary:hover {
            background: #4a5568;
        }

        .btn-danger {
            background: #f56565;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            color: white;
        }

        .btn-info {
            background: #4299e1;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            color: white;
        }

        /* Badges de ação */
        .badge-action {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            display: inline-block;
        }

        .badge-CREATE { background: #48bb78; }
        .badge-UPDATE { background: #f6ad55; }
        .badge-DELETE { background: #f56565; }
        .badge-MOVE { background: #4299e1; }
        .badge-LOGIN { background: #9f7aea; }
        .badge-LOGOUT { background: #a0aec0; }
        .badge-LOGIN_FAILED { background: #fc8181; }

        /* Tabela */
        .table-container {
            margin-top: 20px;
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            padding: 12px;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 12px;
            vertical-align: middle;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }

        .table tbody tr:hover {
            background: #f7fafc;
        }

        /* Estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .stat-card:nth-child(2) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card:nth-child(3) { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-card:nth-child(4) { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* Modal de detalhes */
        .modal-content {
            border-radius: 16px;
            border: none;
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px 16px 0 0;
        }

        .detail-item {
            margin-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .detail-label {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #2d3748;
            background: #f7fafc;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 9999;
            animation: slideIn 0.3s;
            border-left: 4px solid;
        }

        .toast-notification.success { border-left-color: #48bb78; }
        .toast-notification.error { border-left-color: #f56565; }
        .toast-notification.info { border-left-color: #667eea; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0%); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-icon {
            padding: 5px 10px;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div id="toast" class="toast-notification"></div>

    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="/dashboard">
                <i class="fas fa-tools me-2"></i>🔧 Bancada TI
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuSistema">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuSistema">
                  <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/equipamento/cadastro">
                            <i class="fas fa-desktop me-1"></i>Cadastrar Equipamento
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/usuario/cadastro">
                            <i class="fas fa-user-plus me-1"></i>Cadastrar Usuário
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/quadro-chamados">
                            <i class="fas fa-clipboard-list me-1"></i>Lista
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/relatorios">
                            <i class="fas fa-chart-bar me-1"></i>Relatórios
                        </a>
                    </li>
                     <li class="nav-item">
                        <a class="nav-link" href="/logs">
                            <i class="fas fa-chart-bar me-1"></i>Logs
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <span class="text-light small">
                        <i class="fas fa-user-circle me-1"></i>
                        <span id="userNameDisplay">Carregando...</span>
                    </span>
                    <button onclick="logout()" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-sign-out-alt me-1"></i>Sair
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div style="margin-top: 80px;"></div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="logs-container">
        <div class="logs-card">
            <div class="page-title">
                <i class="fas fa-history" style="color: #667eea;"></i>
                Logs do Sistema
                <span class="badge bg-secondary ms-3" id="totalLogs">0</span>
            </div>

            <!-- Cards de Estatísticas -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-list"></i></div>
                    <div class="stat-number" id="totalHoje">0</div>
                    <div class="stat-label">Logs de Hoje</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-number" id="usuariosAtivos">0</div>
                    <div class="stat-label">Usuários Ativos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-edit"></i></div>
                    <div class="stat-number" id="totalUpdates">0</div>
                    <div class="stat-label">Atualizações</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-trash"></i></div>
                    <div class="stat-number" id="totalDeletes">0</div>
                    <div class="stat-label">Exclusões</div>
                </div>
            </div>

            <!-- Filtros -->
            <div class="filters-section">
                <h5 class="filter-title">
                    <i class="fas fa-filter" style="color: #667eea;"></i>
                    Filtros
                </h5>
                
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="filter-label">Período</label>
                        <input type="text" class="form-control" id="dateRange" placeholder="Selecione o período">
                    </div>
                    
                    <div class="col-md-2">
                        <label class="filter-label">Ação</label>
                        <select class="form-select" id="filterAcao">
                            <option value="">Todas</option>
                            <option value="CREATE">CREATE</option>
                            <option value="UPDATE">UPDATE</option>
                            <option value="DELETE">DELETE</option>
                            <option value="MOVE">MOVE</option>
                            <option value="LOGIN">LOGIN</option>
                            <option value="LOGOUT">LOGOUT</option>
                            <option value="LOGIN_FAILED">LOGIN_FAILED</option>
                        </select>
                    </div>
                    
                    <div class="col-md-2">
                        <label class="filter-label">Entidade</label>
                        <select class="form-select" id="filterEntidade">
                            <option value="">Todas</option>
                            <option value="equipamento">Equipamento</option>
                            <option value="usuario">Usuário</option>
                            <option value="unidade">Unidade</option>
                        </select>
                    </div>
                    
                    <div class="col-md-3">
                        <label class="filter-label">Usuário</label>
                        <input type="text" class="form-control" id="filterUsuario" placeholder="Nome do usuário">
                    </div>
                    
                    <div class="col-md-2">
                        <label class="filter-label">ID da Entidade</label>
                        <input type="number" class="form-control" id="filterEntidadeId" placeholder="ID">
                    </div>
                </div>
                
                <div class="row mt-3">
                    <div class="col-12 d-flex justify-content-end gap-2">
                        <button class="btn btn-info" onclick="aplicarFiltros()">
                            <i class="fas fa-search me-2"></i>Aplicar Filtros
                        </button>
                        <button class="btn btn-secondary" onclick="limparFiltros()">
                            <i class="fas fa-eraser me-2"></i>Limpar
                        </button>
                        <button class="btn btn-danger" onclick="exportarLogs()">
                            <i class="fas fa-file-export me-2"></i>Exportar CSV
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tabela de Logs -->
            <div class="table-container">
                <div id="loadingLogs" class="loading">Carregando logs...</div>
                <table class="table table-hover" id="tabelaLogs" style="display: none;">
                    <thead>
                        <tr>
                            <th>Data/Hora</th>
                            <th>Usuário</th>
                            <th>Ação</th>
                            <th>Entidade</th>
                            <th>ID</th>
                            <th>Descrição</th>
                            <th>IP</th>
                            <th>Detalhes</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaLogs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal de Detalhes -->
    <div class="modal fade" id="modalDetalhesLog" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-info-circle me-2"></i>
                        Detalhes do Log
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalDetalhesBody">
                    <!-- Preenchido via JS -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
    
    <script>
    const API_URL = 'http://localhost:5000/api';
    let todosLogs = [];
    let logsFiltrados = [];
    let dataTable;

    document.addEventListener('DOMContentLoaded', function() {
        verificarAuth();
        carregarUsuario();
        carregarLogs();
        inicializarDatePicker();
    });

    function verificarAuth() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
            return false;
        }
        return true;
    }

    function carregarUsuario() {
        const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
        if (usuario.nome_completo) {
            document.getElementById('userNameDisplay').textContent = usuario.nome_completo;
        }
    }

    function inicializarDatePicker() {
        // Verificar se o jQuery e o daterangepicker estão carregados
        if (typeof $ !== 'undefined' && $.fn.daterangepicker) {
            $('#dateRange').daterangepicker({
                locale: {
                    format: 'DD/MM/YYYY',
                    separator: ' - ',
                    applyLabel: 'Aplicar',
                    cancelLabel: 'Cancelar',
                    fromLabel: 'De',
                    toLabel: 'Até',
                    customRangeLabel: 'Personalizado',
                    daysOfWeek: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'],
                    monthNames: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'],
                    firstDay: 1
                },
                ranges: {
                    'Hoje': [moment(), moment()],
                    'Ontem': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
                    'Últimos 7 dias': [moment().subtract(6, 'days'), moment()],
                    'Últimos 30 dias': [moment().subtract(29, 'days'), moment()],
                    'Este mês': [moment().startOf('month'), moment().endOf('month')],
                    'Mês passado': [moment().subtract(1, 'month').startOf('month'), moment().subtract(1, 'month').endOf('month')]
                },
                startDate: moment().subtract(7, 'days'),
                endDate: moment()
            });
        } else {
            console.warn('DateRangePicker não disponível');
        }
    }

    async function carregarLogs() {
        const token = localStorage.getItem('token');
        const loading = document.getElementById('loadingLogs');
        const tabela = document.getElementById('tabelaLogs');
        
        loading.style.display = 'block';
        tabela.style.display = 'none';

        try {
            const response = await fetch(`${API_URL}/logs`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('usuario');
                window.location.href = '/login';
                return;
            }

            if (!response.ok) {
                throw new Error('Erro ao carregar logs');
            }

            todosLogs = await response.json();
            logsFiltrados = [...todosLogs];
            
            atualizarEstatisticas();
            renderizarTabela();
            
            loading.style.display = 'none';
            tabela.style.display = 'table';
            
        } catch (error) {
            console.error('Erro:', error);
            mostrarToast('Erro ao carregar logs', 'error');
            loading.innerHTML = 'Erro ao carregar logs. Tente novamente.';
        }
    }

    function renderizarTabela() {
        const tbody = document.getElementById('corpoTabelaLogs');
        
        if (logsFiltrados.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4">Nenhum log encontrado</td></tr>';
            return;
        }
        
        tbody.innerHTML = logsFiltrados.map(log => `
            <tr>
                <td>${log.data || '-'}</td>
                <td><strong>${log.usuario || 'Sistema'}</strong></td>
                <td><span class="badge-action badge-${log.acao || 'UNKNOWN'}">${log.acao || 'UNKNOWN'}</span></td>
                <td>${log.entidade || '-'}</td>
                <td>${log.entidade_id || '-'}</td>
                <td>${log.descricao || '-'}</td>
                <td>${log.ip || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-info btn-icon" onclick="verDetalhes(${log.id})" title="Ver detalhes">
                        <i class="fas fa-eye"></i>
                    </button>
                </td>
            </tr>
        `).join('');

        document.getElementById('totalLogs').textContent = logsFiltrados.length;

        // Destruir DataTable existente se houver
        if (dataTable) {
            dataTable.destroy();
        }
        
        // Verificar se o jQuery e DataTable estão carregados
        if (typeof $ !== 'undefined' && $.fn.DataTable) {
            try {
                dataTable = $('#tabelaLogs').DataTable({
                    language: {
                        "sEmptyTable": "Nenhum registro encontrado",
                        "sInfo": "Mostrando de _START_ até _END_ de _TOTAL_ registros",
                        "sInfoEmpty": "Mostrando 0 até 0 de 0 registros",
                        "sInfoFiltered": "(Filtrados de _MAX_ registros)",
                        "sInfoPostFix": "",
                        "sInfoThousands": ".",
                        "sLengthMenu": "_MENU_ resultados por página",
                        "sLoadingRecords": "Carregando...",
                        "sProcessing": "Processando...",
                        "sZeroRecords": "Nenhum registro encontrado",
                        "sSearch": "Pesquisar:",
                        "oPaginate": {
                            "sNext": "Próximo",
                            "sPrevious": "Anterior",
                            "sFirst": "Primeiro",
                            "sLast": "Último"
                        },
                        "oAria": {
                            "sSortAscending": ": Ordenar colunas de forma ascendente",
                            "sSortDescending": ": Ordenar colunas de forma descendente"
                        }
                    },
                    pageLength: 25,
                    order: [[0, 'desc']],
                    columnDefs: [
                        { type: 'date', targets: 0 }
                    ]
                });
            } catch (error) {
                console.error('Erro ao inicializar DataTable:', error);
            }
        } else {
            console.warn('DataTable não disponível');
        }
    }

    function atualizarEstatisticas() {
        const hoje = new Date().toLocaleDateString('pt-BR');
        
        const logsHoje = todosLogs.filter(log => log.data && log.data.startsWith(hoje));
        const usuariosUnicos = new Set(todosLogs.map(log => log.usuario).filter(Boolean));
        const updates = todosLogs.filter(log => log.acao === 'UPDATE').length;
        const deletes = todosLogs.filter(log => log.acao === 'DELETE').length;

        document.getElementById('totalHoje').textContent = logsHoje.length;
        document.getElementById('usuariosAtivos').textContent = usuariosUnicos.size;
        document.getElementById('totalUpdates').textContent = updates;
        document.getElementById('totalDeletes').textContent = deletes;
    }

    function aplicarFiltros() {
        // Verificar se o dateRange existe e tem data
        let dataInicio = null;
        let dataFim = null;
        
        if (typeof $ !== 'undefined' && $('#dateRange').data('daterangepicker')) {
            const dateRange = $('#dateRange').data('daterangepicker');
            dataInicio = dateRange.startDate.format('YYYY-MM-DD');
            dataFim = dateRange.endDate.format('YYYY-MM-DD');
        }
        
        const acao = document.getElementById('filterAcao').value;
        const entidade = document.getElementById('filterEntidade').value;
        const usuario = document.getElementById('filterUsuario').value.toLowerCase();
        const entidadeId = document.getElementById('filterEntidadeId').value;

        logsFiltrados = todosLogs.filter(log => {
            // Filtro por data
            if (dataInicio && dataFim && log.data) {
                const logDateStr = log.data.split(' ')[0].split('/').reverse().join('-');
                if (logDateStr < dataInicio || logDateStr > dataFim) return false;
            }
            
            // Filtro por ação
            if (acao && log.acao !== acao) return false;
            
            // Filtro por entidade
            if (entidade && log.entidade !== entidade) return false;
            
            // Filtro por usuário
            if (usuario && log.usuario && !log.usuario.toLowerCase().includes(usuario)) return false;
            
            // Filtro por ID da entidade
            if (entidadeId && log.entidade_id != entidadeId) return false;
            
            return true;
        });

        renderizarTabela();
        mostrarToast(`Filtros aplicados: ${logsFiltrados.length} logs encontrados`, 'info');
    }

    function limparFiltros() {
        if (typeof $ !== 'undefined' && $('#dateRange').data('daterangepicker')) {
            $('#dateRange').data('daterangepicker').setStartDate(moment().subtract(7, 'days'));
            $('#dateRange').data('daterangepicker').setEndDate(moment());
        }
        
        document.getElementById('filterAcao').value = '';
        document.getElementById('filterEntidade').value = '';
        document.getElementById('filterUsuario').value = '';
        document.getElementById('filterEntidadeId').value = '';
        
        logsFiltrados = [...todosLogs];
        renderizarTabela();
    }

    function verDetalhes(logId) {
        const log = todosLogs.find(l => l.id === logId);
        if (!log) return;

        const modalBody = document.getElementById('modalDetalhesBody');
        
        modalBody.innerHTML = `
            <div class="detail-item">
                <div class="detail-label">ID do Log</div>
                <div class="detail-value">${log.id || '-'}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Data/Hora</div>
                <div class="detail-value">${log.data || '-'}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Usuário</div>
                <div class="detail-value">${log.usuario || 'Sistema'}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Ação</div>
                <div class="detail-value"><span class="badge-action badge-${log.acao || 'UNKNOWN'}">${log.acao || 'UNKNOWN'}</span></div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Entidade</div>
                <div class="detail-value">${log.entidade || '-'} ${log.entidade_id ? '(ID: ' + log.entidade_id + ')' : ''}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Descrição</div>
                <div class="detail-value">${log.descricao || '-'}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">IP</div>
                <div class="detail-value">${log.ip || '-'}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">User Agent</div>
                <div class="detail-value" style="max-height: 100px; overflow-y: auto;">${log.user_agent || '-'}</div>
            </div>
        `;

        new bootstrap.Modal(document.getElementById('modalDetalhesLog')).show();
    }

    function exportarLogs() {
        const headers = ['Data/Hora', 'Usuário', 'Ação', 'Entidade', 'ID', 'Descrição', 'IP'];
        const rows = logsFiltrados.map(log => [
            log.data || '',
            log.usuario || '',
            log.acao || '',
            log.entidade || '',
            log.entidade_id || '',
            log.descricao || '',
            log.ip || ''
        ]);
        
        let csv = headers.join(';') + '\n';
        rows.forEach(row => {
            csv += row.map(cell => `"${cell}"`).join(';') + '\n';
        });
        
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `logs_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        
        mostrarToast('Logs exportados com sucesso!', 'success');
    }

    function mostrarToast(mensagem, tipo) {
        const toast = document.getElementById('toast');
        toast.textContent = mensagem;
        toast.className = `toast-notification ${tipo}`;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    function logout() {
        if (confirm('Deseja realmente sair?')) {
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            window.location.href = '/login';
        }
    }
</script>
</body>
</html>
