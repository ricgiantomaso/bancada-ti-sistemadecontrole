        @keyframes slideIn {

<body>

    <div class="card-chamados">

            <div class="col-md-3">

    <!-- Modal de Visualização de Chamado -->
<div class="modal fade" id="modalVisualizarChamado" tabindex="-1">

            <div class="modal-header">

                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">

                        <div class="info-group mb-3">

                        </div>
                        <div class="info-group mb-3">
                            <label class="text-muted small">Tipo de Equipamento</label>
                            <p class="fw-bold" id="modalTipo">-</p>
                        </div>
                        <div class="info-group mb-3">
                            <label class="text-muted small">Local / Setor</label>
                            <p class="fw-bold" id="modalLocal">-</p>
                        </div>
                        <div class="info-group mb-3">
                            <label class="text-muted small">Data de Entrada</label>
                            <p class="fw-bold" id="modalData">-</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-group mb-3">
                            <label class="text-muted small">Criado por</label>
                            <p class="fw-bold" id="modalCriador">-</p>
                        </div>
                        <div class="info-group mb-3">
                            <label class="text-muted small">Prioridade</label>
                            <p class="fw-bold" id="modalPrioridade">-</p>
                        </div>
                        <div class="info-group mb-3">
                            <label class="text-muted small">Status</label>
                            <p class="fw-bold" id="modalStatus">-</p>
                        </div>
                        <div class="info-group mb-3">
                            <label class="text-muted small">Última Atualização</label>
                            <p class="fw-bold" id="modalAtualizacao">-</p>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-3">
                    <div class="col-12">
                        <div class="info-group mb-3">
                            <label class="text-muted small">Defeito Relatado</label>
                            <div class="p-3 bg-light rounded" id="modalDefeito">-</div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="info-group mb-3">
                            <label class="text-muted small">Observações</label>
                            <div class="p-3 bg-light rounded" id="modalObservacoes">-</div>
                        </div>
                    </div>

<style>
    .info-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
    }
    .info-group p {
        margin-bottom: 0;
        padding: 8px 12px;
        background: #f8f9fa;
        border-radius: 8px;
        border-left: 3px solid #667eea;
    }
    .bg-light {
        background-color: #f8f9fa !important;
        border-left: 3px solid #667eea;
    }
</style>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let dataTable;

        document.addEventListener('DOMContentLoaded', function() {
            verificarAuth();
            carregarUsuario();
            carregarChamados();
        });

        function verificarAuth() {
            if (!localStorage.getItem('token')) window.location.href = '/login';
        }

        function carregarUsuario() {
            const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
            document.getElementById('userNameDisplay').textContent = usuario.nome_completo || 'Técnico';
        }

        async function carregarChamados() {
            try {
                const response = await fetch(`${API_URL}/equipamentos`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const data = await response.json();
                const chamados = Array.isArray(data) ? data : (data.equipamentos || []);
                
                renderizarTabela(chamados);
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        function renderizarTabela(chamados) {
            const tbody = document.getElementById('tabelaChamadosBody');
            
            if (chamados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">Nenhum chamado encontrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = chamados.map(c => `
                <tr>
                    <td><strong>#${c.id}</strong></td>
                    <td>${c.patrimonio || '-'}</td>
                    <td>${c.defeito?.substring(0, 50) || '-'}</td>
                    <td>${c.local || '-'}</td>
                    <td>${new Date(c.data_entrada).toLocaleDateString('pt-BR')}</td>
                    <td>${c.criador_nome || 'Sistema'}</td>
                    <td>${getBadgePrioridade(c.prioridade)}</td>
                    <td>${getBadgeStatus(c.status)}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="verChamado(${c.id})"><i class="fas fa-eye"></i></button>
                       <button class="btn btn-sm btn-warning" onclick="editarChamado(${c.id})" title="Editar">
    <i class="fas fa-edit"></i>
</button>
                    </td>
                </tr>
            `).join('');
            
            if (dataTable) dataTable.destroy();
            dataTable = $('#tabelaChamados').DataTable({
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json' },
                pageLength: 10,
                order: [[0, 'desc']]
            });
        }

        function getBadgePrioridade(p) {
            const cores = { baixa: 'success', media: 'secondary', alta: 'warning', urgente: 'danger' };
            return `<span class="badge bg-${cores[p] || 'secondary'}">${p}</span>`;
        }

        function getBadgeStatus(s) {
            const cores = { entrada: 'primary', manutencao: 'warning', pronto: 'success', entregue: 'secondary' };
            return `<span class="badge bg-${cores[s] || 'secondary'}">${s}</span>`;
        }

        // Função para visualizar chamado (agora com modal)
async function verChamado(id) {
    const token = localStorage.getItem('token');
    if (!token) return;

    try {
        // Mostrar loading no botão
        const btn = event.target;
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        btn.disabled = true;

        const response = await fetch(`${API_URL}/equipamentos/${id}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        btn.innerHTML = originalHtml;
        btn.disabled = false;

        if (response.status === 401) {
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            window.location.href = '/login';
            return;
        }

        if (!response.ok) {
            throw new Error('Chamado não encontrado');
        }

        const chamado = await response.json();
        
        // Preencher modal com os dados
        document.getElementById('modalChamadoId').textContent = `#${chamado.id}`;
        document.getElementById('modalId').textContent = `#${chamado.id}`;
        document.getElementById('modalPatrimonio').textContent = chamado.patrimonio || '-';
        document.getElementById('modalTipo').textContent = chamado.tipo_equipamento || '-';
        document.getElementById('modalLocal').textContent = chamado.local || '-';
        document.getElementById('modalData').textContent = chamado.data_entrada ? 
            new Date(chamado.data_entrada).toLocaleDateString('pt-BR') : '-';
        document.getElementById('modalCriador').textContent = chamado.criador_nome || 'Sistema';
        document.getElementById('modalDefeito').textContent = chamado.defeito || '-';
        document.getElementById('modalObservacoes').textContent = chamado.observacoes || '-';
        document.getElementById('modalAtualizacao').textContent = chamado.atualizado_em ? 
            new Date(chamado.atualizado_em).toLocaleString('pt-BR') : '-';
        
        // Badges para prioridade e status
        const prioridadeBadge = getBadgePrioridade(chamado.prioridade);
        const statusBadge = getBadgeStatus(chamado.status);
        
        document.getElementById('modalPrioridade').innerHTML = prioridadeBadge;
        document.getElementById('modalStatus').innerHTML = statusBadge;
        
        // Guardar ID para o botão editar
        document.getElementById('btnEditarModal').setAttribute('data-id', chamado.id);
        
        // Abrir modal
        new bootstrap.Modal(document.getElementById('modalVisualizarChamado')).show();
        
    } catch (error) {
        console.error('Erro:', error);
        mostrarToast('Erro ao carregar detalhes do chamado', 'error');
    }
}

// Função para editar a partir do modal
function editarDoModal() {
    const id = document.getElementById('btnEditarModal').getAttribute('data-id');
    if (id) {
        // Fechar o modal
        bootstrap.Modal.getInstance(document.getElementById('modalVisualizarChamado')).hide();
        // Redirecionar para edição
        window.location.href = `/editar-chamado?id=${id}`;
    }
}
        function editarChamado(id) {
    window.location.href = `/editar-chamado?id=${id}`;
}
function mostrarToast(mensagem, tipo) {
    const toast = document.getElementById('toast');
    if (!toast) return;
    
    toast.textContent = mensagem;
    toast.className = `toast-notification ${tipo}`;
    toast.style.display = 'block';
    setTimeout(() => {
        toast.style.display = 'none';
    }, 3000);
}
        function logout() { localStorage.clear(); window.location.href = '/login'; }
    </script>
    <!-- Socket.IO -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>

    
    // Configuração do Socket.IO
    let socket;
    
    function initSocket() {
        socket = io('http://localhost:5000');
        
        socket.on('connect', function() {
            console.log('🟢 Conectado ao servidor');
            if (typeof mostrarToast === 'function') {
                mostrarToast('Conectado em tempo real', 'success');
            }
        });
        
        socket.on('atualizacao_sistema', function(data) {
            console.log('📢 Atualização:', data);
            
            let mensagem = '';
            if (data.acao === 'CREATE') mensagem = '🆕 Novo chamado criado!';
            else if (data.acao === 'UPDATE') mensagem = '✏️ Chamado atualizado!';
            else if (data.acao === 'MOVE') mensagem = '📦 Chamado movido!';
            else if (data.acao === 'DELETE') mensagem = '🗑️ Chamado deletado!';
            
            if (mensagem && typeof mostrarToast === 'function') {
                mostrarToast(mensagem, 'info');
            }
            
            // Recarregar dados baseado na página
            if (window.location.pathname === '/dashboard' && typeof carregarChamados === 'function') {
                carregarChamados();
            } else if (window.location.pathname === '/quadro-chamados' && typeof carregarChamadosLista === 'function') {
                carregarChamadosLista();
            }
        });
    }
    
    // Iniciar após login
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('token')) {
            initSocket();
        }
    });
</script>
